services:
  mysql:
    image: mysql:8.0
    container_name: mianshiya-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: mianshiya
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mianshiya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    build: ./docker/es
    container_name: mianshiya-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./mianshiya-go-backend/es-plugins:/usr/share/elasticsearch/plugins
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 20

  backend:
    image: mianshiya-backend:latest
    container_name: mianshiya-backend
    restart: unless-stopped
    ports:
      - "8101:8101"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./mianshiya-go-backend/config.docker.yaml:/app/config.yaml:ro

  frontend:
    image: mianshiya-frontend:latest
    container_name: mianshiya-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mianshiya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:
  es_data:
  uploads_data:
